<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL Auction — Lobby</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app lobby-app">
    <header class="header">
      <h1>IPL Auction Simulator</h1>
      <p class="subtitle">Real-time bidding with friends</p>
    </header>

    <main class="lobby-main">
      <section class="lobby-card panel">
        <h2>Lobby</h2>
        <div class="lobby-controls">
          <div class="lobby-group">
            <h3>Create a New Room</h3>
            <p class="hint">Become the auctioneer and manage the bidding.</p>
            <button id="btnCreateRoom" class="btn btn-primary btn-large">Create Room</button>
          </div>
          
          <div class="divider"><span>OR</span></div>
          
          <div class="lobby-group">
            <h3>Join an Existing Room</h3>
            <p class="hint">Join as a bidder and compete for players.</p>
            <div class="join-input-group">
              <input type="text" id="joinRoomId" placeholder="Enter 4-digit ID" maxlength="4">
              <button id="btnJoinRoom" class="btn btn-secondary">Join Room</button>
            </div>
            <p id="lobbyError" class="bid-error"></p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
